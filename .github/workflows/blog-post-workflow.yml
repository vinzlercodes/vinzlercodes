name: Latest blog posts

on:
  schedule:          # run automatically
    - cron: '0 6 * * *'   # once a day at 06:00 UTC
  workflow_dispatch: # allow manual runs from the Actions tab

permissions:
  contents: write    # required to commit README changes

jobs:
  update-readme-with-blog:
    name: Update README with latest Medium posts
    runs-on: ubuntu-latest
    concurrency:
      group: blog-posts
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pull in Medium posts
        uses: gautamkrishnar/blog-post-workflow@v1
        with:
          feed_list: "https://medium.com/feed/@vinayak.sengupta"
          max_post_count: 5
          commit_message: "chore: update README with latest Medium posts"
